<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function firstlast(arr){
            let result = {}
            result[arr[0]] = arr[arr.length-1];
            return result;
        }

        let input = ["ABC","DEF","Employee","Manager"]
        console.log(firstlast(input))
    </script>
